AWSTemplateFormatVersion: "2010-09-09"
Description: CloudRAG Agent MVP 1 - serverless RAG backbone.

Parameters:
  ProjectName:
    Type: String
    Default: cloudrag
  EnvironmentName:
    Type: String
    Default: mvp
  RawBucketName:
    Type: String
    Default: ""
    Description: Optional globally unique S3 bucket name. Leave blank to let CloudFormation generate one.
  DbName:
    Type: String
    Default: cloudragdb
  DbUsername:
    Type: String
    Default: postgres
  DbPassword:
    Type: String
    NoEcho: true
    MinLength: 8
  DbInstanceClass:
    Type: String
    Default: db.t3.micro
  DbAllocatedStorage:
    Type: Number
    Default: 20
  DbIngressCidr:
    Type: String
    Default: 0.0.0.0/0
    Description: CIDR allowed to connect to PostgreSQL. Use your-ip/32 for local-only; 0.0.0.0/0 lets public Lambda + GitHub runner connect for MVP experiments.
  OpenAIApiKey:
    Type: String
    NoEcho: true
  OpenAIEmbeddingModel:
    Type: String
    Default: text-embedding-3-small
  OpenAILlmModel:
    Type: String
    Default: gpt-4.1-mini
  LambdaCodeS3Bucket:
    Type: String
  AuthCodeS3Key:
    Type: String
  V1DocumentsCodeS3Key:
    Type: String
  MemoryCodeS3Key:
    Type: String
  ChatCodeS3Key:
    Type: String
  RuntimeWorkerCodeS3Key:
    Type: String
  RunCodeS3Key:
    Type: String
  UploadUrlCodeS3Key:
    Type: String
  DocumentStatusCodeS3Key:
    Type: String
  StartProcessCodeS3Key:
    Type: String
  ProcessStatusCodeS3Key:
    Type: String
  ProcessingWorkerCodeS3Key:
    Type: String
  RetrievalCodeS3Key:
    Type: String
  AskCodeS3Key:
    Type: String

Conditions:
  HasRawBucketName: !Not [!Equals [!Ref RawBucketName, ""]]

Resources:
  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub ${ProjectName}-${EnvironmentName}-users
      UsernameAttributes:
        - email
      AutoVerifiedAttributes:
        - email
      MfaConfiguration: "OFF"
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: true
          RequireUppercase: true
      Schema:
        - Name: email
          AttributeDataType: String
          Mutable: true
          Required: true
        - Name: name
          AttributeDataType: String
          Mutable: true
          Required: false
      AccountRecoverySetting:
        RecoveryMechanisms:
          - Name: verified_email
            Priority: 1

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub ${ProjectName}-${EnvironmentName}-web-client
      UserPoolId: !Ref UserPool
      GenerateSecret: false
      PreventUserExistenceErrors: ENABLED
      AccessTokenValidity: 15
      IdTokenValidity: 15
      RefreshTokenValidity: 7
      TokenValidityUnits:
        AccessToken: minutes
        IdToken: minutes
        RefreshToken: days
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
        - ALLOW_USER_SRP_AUTH

  RawDocumentsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !If [HasRawBucketName, !Ref RawBucketName, !Ref AWS::NoValue]
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders: ["*"]
            AllowedMethods: [GET, HEAD, POST, PUT]
            AllowedOrigins: ["*"]
            MaxAge: 3000

  UsersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: cloudrag_users
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: user_id
          AttributeType: S
      KeySchema:
        - AttributeName: user_id
          KeyType: HASH

  DocumentsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: cloudrag_documents
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: document_id
          AttributeType: S
        - AttributeName: user_id
          AttributeType: S
        - AttributeName: created_at
          AttributeType: S
      KeySchema:
        - AttributeName: document_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: user_id-created_at-index
          KeySchema:
            - AttributeName: user_id
              KeyType: HASH
            - AttributeName: created_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  ProcessJobsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: cloudrag_process_jobs
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: process_id
          AttributeType: S
        - AttributeName: document_id
          AttributeType: S
        - AttributeName: created_at
          AttributeType: S
      KeySchema:
        - AttributeName: process_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: document_id-created_at-index
          KeySchema:
            - AttributeName: document_id
              KeyType: HASH
            - AttributeName: created_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  ChatsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: cloudrag_chats
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: chat_id
          AttributeType: S
        - AttributeName: user_id
          AttributeType: S
        - AttributeName: updated_at
          AttributeType: S
      KeySchema:
        - AttributeName: chat_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: user_id-updated_at-index
          KeySchema:
            - AttributeName: user_id
              KeyType: HASH
            - AttributeName: updated_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  MessagesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: cloudrag_messages
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: chat_id
          AttributeType: S
        - AttributeName: message_id
          AttributeType: S
      KeySchema:
        - AttributeName: chat_id
          KeyType: HASH
        - AttributeName: message_id
          KeyType: RANGE

  MemoryTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: cloudrag_memory
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: memory_id
          AttributeType: S
        - AttributeName: chat_id
          AttributeType: S
        - AttributeName: created_at
          AttributeType: S
      KeySchema:
        - AttributeName: memory_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: chat_id-created_at-index
          KeySchema:
            - AttributeName: chat_id
              KeyType: HASH
            - AttributeName: created_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  RunsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: cloudrag_runs
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: run_id
          AttributeType: S
        - AttributeName: user_id
          AttributeType: S
        - AttributeName: chat_id
          AttributeType: S
        - AttributeName: created_at
          AttributeType: S
      KeySchema:
        - AttributeName: run_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: user_id-created_at-index
          KeySchema:
            - AttributeName: user_id
              KeyType: HASH
            - AttributeName: created_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: chat_id-created_at-index
          KeySchema:
            - AttributeName: chat_id
              KeyType: HASH
            - AttributeName: created_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  ProcessingDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: cloudrag-processing-dlq
      MessageRetentionPeriod: 345600

  ProcessingQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: cloudrag-processing-queue
      VisibilityTimeout: 960
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt ProcessingDLQ.Arn
        maxReceiveCount: 3

  RuntimeDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: cloudrag-runtime-dlq
      MessageRetentionPeriod: 345600

  RuntimeQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: cloudrag-runtime-queue
      VisibilityTimeout: 360
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt RuntimeDLQ.Arn
        maxReceiveCount: 3

  RagVpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.42.0.0/16
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${EnvironmentName}-vpc

  InternetGateway:
    Type: AWS::EC2::InternetGateway

  VpcGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      InternetGatewayId: !Ref InternetGateway
      VpcId: !Ref RagVpc

  PublicSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref RagVpc
      CidrBlock: 10.42.1.0/24
      AvailabilityZone: !Select [0, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${EnvironmentName}-public-a

  PublicSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref RagVpc
      CidrBlock: 10.42.2.0/24
      AvailabilityZone: !Select [1, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${EnvironmentName}-public-b

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref RagVpc

  PublicDefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: VpcGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnetARouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref PublicSubnetA

  PublicSubnetBRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref PublicSubnetB

  DbSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: CloudRAG PostgreSQL access
      GroupName: !Sub ${ProjectName}-${EnvironmentName}-rds-sg
      VpcId: !Ref RagVpc
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          CidrIp: !Ref DbIngressCidr

  DbSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: CloudRAG public DB subnet group for MVP experiments
      SubnetIds:
        - !Ref PublicSubnetA
        - !Ref PublicSubnetB

  PostgresDb:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      DBInstanceIdentifier: !Sub ${ProjectName}-${EnvironmentName}-postgres
      DBInstanceClass: !Ref DbInstanceClass
      AllocatedStorage: !Ref DbAllocatedStorage
      Engine: postgres
      DBName: !Ref DbName
      MasterUsername: !Ref DbUsername
      MasterUserPassword: !Ref DbPassword
      DBSubnetGroupName: !Ref DbSubnetGroup
      VPCSecurityGroups:
        - !Ref DbSecurityGroup
      PubliclyAccessible: true
      MultiAZ: false
      StorageType: gp3
      StorageEncrypted: true
      BackupRetentionPeriod: 0
      DeletionProtection: false
      AutoMinorVersionUpgrade: true

  AuthRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-${EnvironmentName}-auth-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: AuthAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - cognito-idp:SignUp
                  - cognito-idp:ConfirmSignUp
                  - cognito-idp:InitiateAuth
                  - cognito-idp:GlobalSignOut
                  - cognito-idp:AdminGetUser
                Resource: !GetAtt UserPool.Arn
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                Resource: !GetAtt UsersTable.Arn

  V1DocumentsRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-${EnvironmentName}-v1-documents-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: V1DocumentsAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:GetItem
                  - dynamodb:UpdateItem
                  - dynamodb:Query
                Resource:
                  - !GetAtt DocumentsTable.Arn
                  - !Sub ${DocumentsTable.Arn}/index/*
                  - !GetAtt ProcessJobsTable.Arn
                  - !Sub ${ProcessJobsTable.Arn}/index/*
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                Resource:
                  - !Sub ${RawDocumentsBucket.Arn}/raw/*
                  - !Sub ${RawDocumentsBucket.Arn}/processed/*
              - Effect: Allow
                Action: s3:ListBucket
                Resource: !GetAtt RawDocumentsBucket.Arn
              - Effect: Allow
                Action: sqs:SendMessage
                Resource: !GetAtt ProcessingQueue.Arn

  MemoryRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-${EnvironmentName}-memory-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: MemoryAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:UpdateItem
                  - dynamodb:Query
                  - dynamodb:PutItem
                Resource:
                  - !GetAtt ChatsTable.Arn
                  - !Sub ${ChatsTable.Arn}/index/*
                  - !GetAtt MessagesTable.Arn
                  - !GetAtt MemoryTable.Arn
                  - !Sub ${MemoryTable.Arn}/index/*

  ChatRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-${EnvironmentName}-chat-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: ChatAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:GetItem
                  - dynamodb:UpdateItem
                  - dynamodb:Query
                Resource:
                  - !GetAtt ChatsTable.Arn
                  - !Sub ${ChatsTable.Arn}/index/*
                  - !GetAtt MessagesTable.Arn
                  - !GetAtt RunsTable.Arn
                  - !Sub ${RunsTable.Arn}/index/*
              - Effect: Allow
                Action: sqs:SendMessage
                Resource: !GetAtt RuntimeQueue.Arn

  RuntimeWorkerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-${EnvironmentName}-runtime-worker-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: RuntimeWorkerAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                  - sqs:GetQueueAttributes
                  - sqs:ChangeMessageVisibility
                Resource: !GetAtt RuntimeQueue.Arn
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:GetItem
                  - dynamodb:UpdateItem
                  - dynamodb:Query
                Resource:
                  - !GetAtt ChatsTable.Arn
                  - !Sub ${ChatsTable.Arn}/index/*
                  - !GetAtt MessagesTable.Arn
                  - !GetAtt MemoryTable.Arn
                  - !Sub ${MemoryTable.Arn}/index/*
                  - !GetAtt RunsTable.Arn
                  - !Sub ${RunsTable.Arn}/index/*
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                Resource:
                  - !Sub ${RawDocumentsBucket.Arn}/traces/*
                  - !Sub ${RawDocumentsBucket.Arn}/artifacts/*

  RunRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-${EnvironmentName}-run-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: RunAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:Query
                Resource:
                  - !GetAtt RunsTable.Arn
                  - !Sub ${RunsTable.Arn}/index/*
              - Effect: Allow
                Action: s3:GetObject
                Resource: !Sub ${RawDocumentsBucket.Arn}/traces/*

  UploadUrlRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-${EnvironmentName}-upload-url-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: UploadUrlAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: dynamodb:PutItem
                Resource: !GetAtt DocumentsTable.Arn
              - Effect: Allow
                Action: s3:PutObject
                Resource: !Sub ${RawDocumentsBucket.Arn}/raw/*

  DocumentStatusRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-${EnvironmentName}-document-status-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DocumentStatusAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: [dynamodb:GetItem, dynamodb:UpdateItem]
                Resource: !GetAtt DocumentsTable.Arn
              - Effect: Allow
                Action: s3:GetObject
                Resource: !Sub ${RawDocumentsBucket.Arn}/raw/*

  StartProcessRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-${EnvironmentName}-start-process-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: StartProcessAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: [dynamodb:GetItem, dynamodb:UpdateItem]
                Resource: !GetAtt DocumentsTable.Arn
              - Effect: Allow
                Action: dynamodb:PutItem
                Resource: !GetAtt ProcessJobsTable.Arn
              - Effect: Allow
                Action: s3:GetObject
                Resource: !Sub ${RawDocumentsBucket.Arn}/raw/*
              - Effect: Allow
                Action: sqs:SendMessage
                Resource: !GetAtt ProcessingQueue.Arn

  ProcessStatusRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-${EnvironmentName}-process-status-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: ProcessStatusAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: dynamodb:GetItem
                Resource: !GetAtt ProcessJobsTable.Arn

  ProcessingWorkerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-${EnvironmentName}-processing-worker-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: ProcessingWorkerAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: [sqs:ReceiveMessage, sqs:DeleteMessage, sqs:GetQueueAttributes, sqs:ChangeMessageVisibility]
                Resource: !GetAtt ProcessingQueue.Arn
              - Effect: Allow
                Action: [dynamodb:GetItem, dynamodb:UpdateItem]
                Resource:
                  - !GetAtt DocumentsTable.Arn
                  - !GetAtt ProcessJobsTable.Arn
              - Effect: Allow
                Action: s3:GetObject
                Resource: !Sub ${RawDocumentsBucket.Arn}/raw/*
              - Effect: Allow
                Action: s3:PutObject
                Resource: !Sub ${RawDocumentsBucket.Arn}/processed/*

  RetrievalRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-${EnvironmentName}-retrieval-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  AskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-${EnvironmentName}-ask-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  UploadUrlFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: cloudrag-upload-url-handler
      Runtime: python3.13
      Handler: handler.lambda_handler
      Role: !GetAtt UploadUrlRole.Arn
      Timeout: 30
      MemorySize: 256
      Code:
        S3Bucket: !Ref LambdaCodeS3Bucket
        S3Key: !Ref UploadUrlCodeS3Key
      Environment:
        Variables:
          RAW_BUCKET: !Ref RawDocumentsBucket
          DOCUMENT_TABLE: !Ref DocumentsTable
          PROCESS_JOB_TABLE: !Ref ProcessJobsTable
          PROCESS_QUEUE_URL: !Ref ProcessingQueue
          UPLOAD_EXPIRY_SECONDS: "900"
          MAX_FILES: "10"
          MAX_FILE_SIZE_BYTES: "10485760"
          OPENAI_API_KEY: !Ref OpenAIApiKey
          OPENAI_EMBEDDING_MODEL: !Ref OpenAIEmbeddingModel
          OPENAI_LLM_MODEL: !Ref OpenAILlmModel
          PG_HOST: !GetAtt PostgresDb.Endpoint.Address
          PG_PORT: !GetAtt PostgresDb.Endpoint.Port
          PG_DATABASE: !Ref DbName
          PG_USER: !Ref DbUsername
          PG_PASSWORD: !Ref DbPassword
          CHUNK_SIZE: "800"
          CHUNK_OVERLAP: "120"
          EMBEDDING_BATCH_SIZE: "50"
          DEFAULT_TOP_K: "5"
          DEFAULT_SIMILARITY_THRESHOLD: "0.0"

  DocumentStatusFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: cloudrag-document-status-handler
      Runtime: python3.13
      Handler: handler.lambda_handler
      Role: !GetAtt DocumentStatusRole.Arn
      Timeout: 30
      MemorySize: 256
      Code:
        S3Bucket: !Ref LambdaCodeS3Bucket
        S3Key: !Ref DocumentStatusCodeS3Key
      Environment:
        Variables:
          RAW_BUCKET: !Ref RawDocumentsBucket
          DOCUMENT_TABLE: !Ref DocumentsTable
          PROCESS_JOB_TABLE: !Ref ProcessJobsTable
          PROCESS_QUEUE_URL: !Ref ProcessingQueue
          UPLOAD_EXPIRY_SECONDS: "900"
          MAX_FILES: "10"
          MAX_FILE_SIZE_BYTES: "10485760"
          OPENAI_API_KEY: !Ref OpenAIApiKey
