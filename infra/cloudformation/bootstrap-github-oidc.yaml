AWSTemplateFormatVersion: "2010-09-09"
Description: Bootstrap GitHub Actions OIDC deployment role and Lambda artifact bucket for CloudRAG.

Parameters:
  GitHubOrg:
    Type: String
    Default: sasankjampana8
  GitHubRepo:
    Type: String
    Default: agentic-rag-aws
  ArtifactBucketName:
    Type: String
    Description: Globally unique S3 bucket name for Lambda deployment ZIPs.
  CreateGitHubOidcProvider:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]

Conditions:
  ShouldCreateGitHubOidcProvider: !Equals [!Ref CreateGitHubOidcProvider, "true"]

Resources:
  LambdaArtifactBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref ArtifactBucketName
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      LifecycleConfiguration:
        Rules:
          - Id: ExpireOldArtifacts
            Status: Enabled
            ExpirationInDays: 14

  GitHubOidcProvider:
    Type: AWS::IAM::OIDCProvider
    Condition: ShouldCreateGitHubOidcProvider
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList:
        - sts.amazonaws.com

  GitHubActionsDeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: cloudrag-github-actions-deploy-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: !If
                - ShouldCreateGitHubOidcProvider
                - !Ref GitHubOidcProvider
                - !Sub arn:${AWS::Partition}:iam::${AWS::AccountId}:oidc-provider/token.actions.githubusercontent.com
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                token.actions.githubusercontent.com:sub: !Sub repo:${GitHubOrg}/${GitHubRepo}:*
      Policies:
        - PolicyName: CloudRagDeployAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - cloudformation:*
                  - s3:*
                  - dynamodb:*
                  - sqs:*
                  - lambda:*
                  - apigateway:*
                  - execute-api:*
                  - logs:*
                  - rds:*
                  - ec2:*
                  - cognito-idp:CreateUserPool
                  - cognito-idp:DeleteUserPool
                  - cognito-idp:DescribeUserPool
                  - cognito-idp:UpdateUserPool
                  - cognito-idp:CreateUserPoolClient
                  - cognito-idp:DeleteUserPoolClient
                  - cognito-idp:DescribeUserPoolClient
                  - cognito-idp:UpdateUserPoolClient
                  - cognito-idp:ListUserPoolClients
                  - cognito-idp:TagResource
                  - cognito-idp:UntagResource
                  - iam:CreateRole
                  - iam:GetRole
                  - iam:UpdateRole
                  - iam:DeleteRole
                  - iam:PassRole
                  - iam:AttachRolePolicy
                  - iam:DetachRolePolicy
                  - iam:PutRolePolicy
                  - iam:GetRolePolicy
                  - iam:DeleteRolePolicy
                  - iam:ListRoles
                  - iam:ListAttachedRolePolicies
                  - iam:ListRolePolicies
                  - iam:TagRole
                  - iam:UntagRole
                Resource: "*"

Outputs:
  ArtifactBucketName:
    Value: !Ref LambdaArtifactBucket
  GitHubActionsDeployRoleArn:
    Value: !GetAtt GitHubActionsDeployRole.Arn
