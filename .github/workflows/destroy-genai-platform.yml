name: Destroy GenAI Platform Backbone

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  destroy:
    runs-on: ubuntu-latest
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'ap-south-1' }}

      - name: Delete stack
        run: |
          aws cloudformation delete-stack \
            --stack-name "${{ vars.GENAI_STACK_NAME || 'genai-platform-backbone-dev' }}"
          aws cloudformation wait stack-delete-complete \
            --stack-name "${{ vars.GENAI_STACK_NAME || 'genai-platform-backbone-dev' }}"

