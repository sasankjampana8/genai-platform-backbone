name: Deploy GenAI Platform Backbone

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'ap-south-1' }}

      - name: Resolve deployment names
        id: names
        run: |
          AWS_ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"
          AWS_REGION="${{ vars.AWS_REGION || 'ap-south-1' }}"
          ECR_REPOSITORY="${{ vars.GENAI_ECR_REPOSITORY || 'genai-platform-backbone' }}"
          IMAGE_TAG="${GITHUB_SHA::12}"
          IMAGE_URI="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPOSITORY}:${IMAGE_TAG}"
          echo "aws-account-id=${AWS_ACCOUNT_ID}" >> "$GITHUB_OUTPUT"
          echo "aws-region=${AWS_REGION}" >> "$GITHUB_OUTPUT"
          echo "ecr-repository=${ECR_REPOSITORY}" >> "$GITHUB_OUTPUT"
          echo "image-uri=${IMAGE_URI}" >> "$GITHUB_OUTPUT"

      - name: Create ECR repository if missing
        run: |
          aws ecr describe-repositories \
            --repository-names "${{ steps.names.outputs.ecr-repository }}" >/dev/null 2>&1 \
          || aws ecr create-repository \
            --repository-name "${{ steps.names.outputs.ecr-repository }}" \
            --image-scanning-configuration scanOnPush=true \
            --encryption-configuration encryptionType=AES256

      - name: Build and push container image
        run: |
          aws ecr get-login-password --region "${{ steps.names.outputs.aws-region }}" \
            | docker login \
              --username AWS \
              --password-stdin "${{ steps.names.outputs.aws-account-id }}.dkr.ecr.${{ steps.names.outputs.aws-region }}.amazonaws.com"
          docker build -t "${{ steps.names.outputs.image-uri }}" .
          docker push "${{ steps.names.outputs.image-uri }}"

      - name: Validate CloudFormation
        run: |
          aws cloudformation validate-template \
            --template-body file://infra/cloudformation/genai-platform-backbone.yaml

      - name: Remove failed rollback stack if present
        run: |
          STACK_NAME="${{ vars.GENAI_STACK_NAME || 'genai-platform-backbone-dev' }}"
          STACK_STATUS="$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query "Stacks[0].StackStatus" \
            --output text 2>/dev/null || true)"
          if [ "$STACK_STATUS" = "ROLLBACK_COMPLETE" ]; then
            echo "Deleting $STACK_NAME because it is in ROLLBACK_COMPLETE state."
            aws cloudformation delete-stack --stack-name "$STACK_NAME"
            aws cloudformation wait stack-delete-complete --stack-name "$STACK_NAME"
          else
            echo "Stack status is '${STACK_STATUS:-not found}'. No failed rollback cleanup needed."
          fi

      - name: Deploy CloudFormation starter
        run: |
          aws cloudformation deploy \
            --template-file infra/cloudformation/genai-platform-backbone.yaml \
            --stack-name "${{ vars.GENAI_STACK_NAME || 'genai-platform-backbone-dev' }}" \
            --capabilities CAPABILITY_NAMED_IAM \
            --parameter-overrides \
              ContainerImage="${{ steps.names.outputs.image-uri }}" \
              DatabasePassword="${{ secrets.DB_PASSWORD }}" \
              OpenAIApiKey="${{ secrets.OPENAI_API_KEY }}"

      - name: Show outputs
        run: |
          aws cloudformation describe-stacks \
            --stack-name "${{ vars.GENAI_STACK_NAME || 'genai-platform-backbone-dev' }}" \
            --query "Stacks[0].Outputs"
